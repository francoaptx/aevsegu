<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAccess - Gestión de Control de Ingreso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // --- CONFIGURACIÓN FIJA ---
        const firebaseConfig = {
            apiKey: "AIzaSyCojva8vXR0-aREvi-chXRp_nVoHsI57pE",
            authDomain: "aevsegu.firebaseapp.com",
            projectId: "aevsegu",
            storageBucket: "aevsegu.firebasestorage.app",
            messagingSenderId: "34531792748",
            appId: "1:34531792748:web:e814648c3df8c5215f0549"
        };

        // Identificador interno para rutas de base de datos
        const internalAppId = typeof __app_id !== 'undefined' ? __app_id : 'security-system-v1';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let user = null;
        let visits = [];
        let editingId = null;
        let unsubscribeVisits = null;

        // --- NAVEGACIÓN ---
        const showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            
            const targetTab = document.getElementById(tabId);
            const targetBtn = document.getElementById('btn-' + tabId);
            
            if (targetTab) targetTab.classList.remove('hidden');
            if (targetBtn) targetBtn.classList.add('bg-blue-600', 'text-white');
            
            const titles = {
                'dashboard': 'Panel Principal',
                'entry-management': 'Gestión de Accesos',
                'reports': 'Reportes y Exportación'
            };
            const titleEl = document.getElementById('current-tab-title');
            if (titleEl) titleEl.innerText = titles[tabId];
        };

        // --- AUTENTICACIÓN ---
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth Error", error);
                const statusEl = document.getElementById('db-status');
                if (statusEl) statusEl.innerHTML = `<span class="text-red-400">Error Auth</span>`;
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                const statusEl = document.getElementById('db-status');
                if (statusEl) {
                    statusEl.innerHTML = `
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        <span class="text-green-400">Nube Conectada</span>
                    `;
                }
                setupListeners();
            }
        });

        // --- ESCUCHADORES DE FIRESTORE ---
        const setupListeners = () => {
            if (!user) return;
            if (unsubscribeVisits) unsubscribeVisits();
            
            // Ruta obligatoria para permisos: /artifacts/{appId}/public/data/visits
            const visitsCollection = collection(db, 'artifacts', internalAppId, 'public', 'data', 'visits');
            
            unsubscribeVisits = onSnapshot(visitsCollection, (snapshot) => {
                visits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                visits.sort((a, b) => new Date(b.entryTime) - new Date(a.entryTime));
                renderAll();
            }, (err) => {
                console.error("Snapshot error:", err);
                const statusEl = document.getElementById('db-status');
                if (statusEl) statusEl.innerHTML = `<span class="text-red-400 text-[10px]">Error de Permisos</span>`;
            });
        };

        // --- OPERACIONES ---
        const saveVisit = async (e) => {
            e.preventDefault();
            if (!user) return;

            const visitData = {
                name: document.getElementById('v-name').value,
                document: document.getElementById('v-doc').value,
                company: document.getElementById('v-company').value,
                vehicle: document.getElementById('v-vehicle').value,
                host: document.getElementById('v-host').value,
                reason: document.getElementById('v-reason').value,
                entryTime: editingId ? visits.find(v => v.id === editingId).entryTime : new Date().toISOString(),
                exitTime: editingId ? (visits.find(v => v.id === editingId).exitTime || null) : null,
                status: editingId ? visits.find(v => v.id === editingId).status : 'active',
                updatedAt: new Date().toISOString()
            };

            try {
                const id = editingId || Date.now().toString();
                const docRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'visits', id);
                await setDoc(docRef, visitData, { merge: true });
                cancelEdit();
                e.target.reset();
            } catch (err) {
                console.error("Save error:", err);
            }
        };

        window.editVisit = (id) => {
            const v = visits.find(visit => visit.id === id);
            if (!v) return;
            editingId = id;
            document.getElementById('v-name').value = v.name;
            document.getElementById('v-doc').value = v.document;
            document.getElementById('v-company').value = v.company;
            document.getElementById('v-vehicle').value = v.vehicle;
            document.getElementById('v-host').value = v.host;
            document.getElementById('v-reason').value = v.reason;
            
            document.getElementById('form-title').innerText = "Editando Registro";
            document.getElementById('btn-submit').innerText = "Actualizar Registro";
            document.getElementById('btn-cancel').classList.remove('hidden');
            showTab('entry-management');
        };

        window.cancelEdit = () => {
            editingId = null;
            document.getElementById('entry-form').reset();
            document.getElementById('form-title').innerText = "Nuevo Registro de Entrada";
            document.getElementById('btn-submit').innerText = "Confirmar Entrada";
            document.getElementById('btn-cancel').classList.add('hidden');
        };

        window.deleteVisit = async (id) => {
            if (!confirm("¿Eliminar registro?")) return;
            try {
                const docRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'visits', id);
                await deleteDoc(docRef);
            } catch (err) {
                console.error("Delete error:", err);
            }
        };

        window.markExit = async (id) => {
            try {
                const docRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'visits', id);
                await updateDoc(docRef, {
                    status: 'finished',
                    exitTime: new Date().toISOString()
                });
            } catch (err) {
                console.error("Exit error:", err);
            }
        };

        const renderAll = () => {
            updateStats();
            renderActiveList();
            renderReportTable();
            lucide.createIcons();
        };

        const updateStats = () => {
            const active = visits.filter(v => v.status === 'active').length;
            const todayStr = new Date().toDateString();
            const today = visits.filter(v => new Date(v.entryTime).toDateString() === todayStr).length;
            const vehicles = visits.filter(v => v.status === 'active' && v.vehicle).length;

            const elActive = document.getElementById('stat-active');
            const elToday = document.getElementById('stat-today');
            const elVehicles = document.getElementById('stat-vehicles');

            if (elActive) elActive.innerText = active;
            if (elToday) elToday.innerText = today;
            if (elVehicles) elVehicles.innerText = vehicles;
        };

        const renderActiveList = () => {
            const container = document.getElementById('active-list-container');
            if (!container) return;
            const activeOnes = visits.filter(v => v.status === 'active');

            if (activeOnes.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-gray-400">No hay personal activo.</div>`;
                return;
            }

            container.innerHTML = activeOnes.map(v => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 hover:border-blue-200 transition">
                    <div class="flex-1">
                        <div class="flex items-center space-x-2">
                            <h4 class="font-bold text-gray-800">${v.name}</h4>
                            <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold uppercase">Activo</span>
                        </div>
                        <p class="text-xs text-gray-500">${v.document} • <span class="text-blue-600 font-medium">${v.host}</span></p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="markExit('${v.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                        <button onclick="editVisit('${v.id}')" class="p-2 text-gray-400 hover:bg-gray-100 rounded-lg transition">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const renderReportTable = () => {
            const tbody = document.getElementById('report-table-body');
            if (!tbody) return;
            const searchTerm = document.getElementById('search-filter')?.value.toLowerCase() || "";
            
            const filtered = visits.filter(v => {
                return (v.name || "").toLowerCase().includes(searchTerm) || 
                       (v.document || "").includes(searchTerm);
            });

            tbody.innerHTML = filtered.map(v => `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="px-4 py-3 font-medium">${v.name}</td>
                    <td class="px-4 py-3 text-gray-500">${v.document}</td>
                    <td class="px-4 py-3 text-gray-500">${new Date(v.entryTime).toLocaleDateString()}</td>
                    <td class="px-4 py-3 font-mono text-xs">
                        ${new Date(v.entryTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} / 
                        ${v.exitTime ? new Date(v.exitTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}
                    </td>
                    <td class="px-4 py-3">
                        <button onclick="deleteVisit('${v.id}')" class="text-gray-300 hover:text-red-500 transition">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.exportToCSV = () => {
            const rows = [["Nombre", "Documento", "Entrada", "Salida", "Estado"]];
            visits.forEach(v => rows.push([v.name, v.document, v.entryTime, v.exitTime || "", v.status]));
            const csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "reporte.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // --- INICIALIZACIÓN ---
        window.addEventListener('DOMContentLoaded', async () => {
            await initAuth();
            showTab('dashboard');
            
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.innerText = new Date().toLocaleDateString();
            
            document.getElementById('entry-form')?.addEventListener('submit', saveVisit);
            document.getElementById('search-filter')?.addEventListener('input', renderReportTable);
            
            window.showTab = showTab;
            window.markExit = markExit;
            window.editVisit = editVisit;
            window.cancelEdit = cancelEdit;
            window.deleteVisit = deleteVisit;
            window.exportToCSV = exportToCSV;
            
            lucide.createIcons();
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="p-6 flex items-center space-x-3">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <span class="text-xl font-bold">SecureAccess</span>
            </div>
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="sidebar-item w-full flex items-center space-x-3 p-3 rounded-xl transition">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Panel</span>
                </button>
                <button onclick="showTab('entry-management')" id="btn-entry-management" class="sidebar-item w-full flex items-center space-x-3 p-3 rounded-xl transition">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    <span>Accesos</span>
                </button>
                <button onclick="showTab('reports')" id="btn-reports" class="sidebar-item w-full flex items-center space-x-3 p-3 rounded-xl transition">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span>Reportes</span>
                </button>
            </nav>
            <div class="p-4 border-t border-slate-800" id="db-status">
                <div class="flex items-center space-x-2 text-[10px] text-amber-400">
                    <div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div>
                    <span>CONECTANDO...</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-50 overflow-hidden">
            <header class="bg-white border-b p-4 flex justify-between items-center px-8">
                <h2 id="current-tab-title" class="text-lg font-bold">Panel Principal</h2>
                <span id="current-date" class="text-xs text-gray-400"></span>
            </header>

            <div class="flex-1 overflow-y-auto p-6">
                <!-- DASHBOARD -->
                <div id="dashboard" class="tab-content space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <p class="text-gray-400 text-[10px] font-bold uppercase">En Planta</p>
                            <h3 id="stat-active" class="text-4xl font-black text-blue-600">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <p class="text-gray-400 text-[10px] font-bold uppercase">Registros Hoy</p>
                            <h3 id="stat-today" class="text-4xl font-black text-slate-800">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <p class="text-gray-400 text-[10px] font-bold uppercase">Vehículos</p>
                            <h3 id="stat-vehicles" class="text-4xl font-black text-amber-500">0</h3>
                        </div>
                    </div>
                </div>

                <!-- ENTRY MANAGEMENT -->
                <div id="entry-management" class="tab-content hidden h-full">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-5 bg-white p-6 rounded-2xl border shadow-xl">
                            <h3 id="form-title" class="text-base font-black mb-6">Nuevo Registro</h3>
                            <form id="entry-form" class="space-y-4">
                                <input type="text" id="v-name" required class="w-full p-3 bg-gray-50 border rounded-xl text-sm" placeholder="Nombre Completo">
                                <input type="text" id="v-doc" required class="w-full p-3 bg-gray-50 border rounded-xl text-sm" placeholder="CI / DNI">
                                <input type="text" id="v-company" class="w-full p-3 bg-gray-50 border rounded-xl text-sm" placeholder="Empresa">
                                <input type="text" id="v-vehicle" class="w-full p-3 bg-gray-50 border rounded-xl text-sm" placeholder="Vehículo (Placa)">
                                <input type="text" id="v-host" required class="w-full p-3 bg-gray-50 border rounded-xl text-sm" placeholder="¿A quién visita?">
                                <textarea id="v-reason" class="w-full p-3 bg-gray-50 border rounded-xl text-sm" placeholder="Motivo"></textarea>
                                <div class="flex space-x-2">
                                    <button type="submit" id="btn-submit" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Confirmar</button>
                                    <button type="button" id="btn-cancel" onclick="cancelEdit()" class="hidden bg-gray-200 px-4 rounded-xl text-sm font-bold">X</button>
                                </div>
                            </form>
                        </div>
                        <div class="lg:col-span-7 space-y-4">
                            <h3 class="font-black text-base">Personal en Planta</h3>
                            <div id="active-list-container" class="space-y-3"></div>
                        </div>
                    </div>
                </div>

                <!-- REPORTS -->
                <div id="reports" class="tab-content hidden space-y-6">
                    <div class="bg-white p-4 rounded-2xl border flex items-center space-x-4">
                        <input type="text" id="search-filter" class="flex-1 p-2 bg-gray-50 border rounded-lg text-sm" placeholder="Buscar por nombre o CI...">
                        <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center">
                            <i data-lucide="download" class="w-4 h-4 mr-2"></i> CSV
                        </button>
                    </div>
                    <div class="bg-white rounded-2xl border overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 border-b">
                                <tr>
                                    <th class="px-4 py-3">Nombre</th>
                                    <th class="px-4 py-3">Documento</th>
                                    <th class="px-4 py-3">Fecha</th>
                                    <th class="px-4 py-3">Horario (E/S)</th>
                                    <th class="px-4 py-3"></th>
                                </tr>
                            </thead>
                            <tbody id="report-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
