<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAccess Pro - Gestión de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCojva8vXR0-aREvi-chXRp_nVoHsI57pE",
            authDomain: "aevsegu.firebaseapp.com",
            projectId: "aevsegu",
            storageBucket: "aevsegu.firebasestorage.app",
            messagingSenderId: "34531792748",
            appId: "1:34531792748:web:e814648c3df8c5215f0549"
        };

        const internalAppId = 'security-system-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let user = null;
        let visits = [];
        let editingId = null;
        let unsubscribeVisits = null;

        const login = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const errorEl = document.getElementById('login-error');
            
            try {
                errorEl.classList.add('hidden');
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                errorEl.innerText = "Credenciales incorrectas.";
                errorEl.classList.remove('hidden');
            }
        };

        const logout = async () => {
            await signOut(auth);
            location.reload();
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            if (user) {
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                setupListeners();
                document.getElementById('user-email-display').innerText = user.email;
            } else {
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        const handleDocLookup = (e) => {
            const rawInput = e.target.value.trim();
            // No autocompletar si estamos en modo edición o si el input es corto
            if (rawInput.length < 3 || editingId) return; 

            const cleanInput = rawInput.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();

            const match = visits.find(v => {
                const cleanStoredDoc = String(v.document || "").replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                return cleanStoredDoc === cleanInput;
            });

            if (match) {
                const nameEl = document.getElementById('v-name');
                const compEl = document.getElementById('v-company');
                const vehEl = document.getElementById('v-vehicle');

                if (nameEl) nameEl.value = match.name || '';
                if (compEl) compEl.value = match.company || '';
                if (vehEl) vehEl.value = match.vehicle || '';
                
                [nameEl, compEl, vehEl].forEach(el => {
                    if (el) {
                        el.classList.add('ring-2', 'ring-blue-400', 'bg-blue-50');
                        setTimeout(() => el.classList.remove('ring-2', 'ring-blue-400', 'bg-blue-50'), 1500);
                    }
                });
            }
        };

        const setupListeners = () => {
            if (!user) return;
            if (unsubscribeVisits) unsubscribeVisits();
            
            const visitsCollection = collection(db, 'artifacts', internalAppId, 'public', 'data', 'visits');
            unsubscribeVisits = onSnapshot(visitsCollection, (snapshot) => {
                visits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                visits.sort((a, b) => new Date(b.entryTime) - new Date(a.entryTime));
                renderAll();
            });
        };

        const saveVisit = async (e) => {
            e.preventDefault();
            const currentVisit = editingId ? visits.find(v => v.id === editingId) : null;
            
            const visitData = {
                name: document.getElementById('v-name').value,
                document: document.getElementById('v-doc').value,
                company: document.getElementById('v-company').value,
                vehicle: document.getElementById('v-vehicle').value,
                host: document.getElementById('v-host').value,
                reason: document.getElementById('v-reason').value,
                entryTime: editingId ? currentVisit.entryTime : new Date().toISOString(),
                exitTime: editingId ? currentVisit.exitTime : null,
                status: editingId ? currentVisit.status : 'active',
                updatedAt: new Date().toISOString()
            };

            try {
                const id = editingId || Date.now().toString();
                const docRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'visits', id);
                await setDoc(docRef, visitData, { merge: true });
                cancelEdit();
                e.target.reset();
            } catch (err) { console.error(err); }
        };

        const renderAll = () => {
            updateStats();
            renderActiveList();
            renderTodayLogs();
            renderReportTable();
            lucide.createIcons();
        };

        const updateStats = () => {
            const active = visits.filter(v => v.status === 'active').length;
            const todayStr = new Date().toDateString();
            const today = visits.filter(v => new Date(v.entryTime).toDateString() === todayStr).length;
            const vehicles = visits.filter(v => v.status === 'active' && v.vehicle).length;

            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-today').innerText = today;
            document.getElementById('stat-vehicles').innerText = vehicles;
        };

        const renderActiveList = () => {
            const container = document.getElementById('active-list-container');
            const activeOnes = visits.filter(v => v.status === 'active');
            container.innerHTML = activeOnes.length === 0 ? 
                `<div class="p-4 text-center text-gray-400 text-[10px] italic">No hay personal activo.</div>` :
                activeOnes.map(v => `
                <div class="flex items-center justify-between p-2 bg-white border-b border-gray-100 hover:bg-blue-50">
                    <div class="flex-1 min-w-0 mr-4">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-gray-800 truncate text-[11px] uppercase">${v.name}</span>
                        </div>
                        <p class="text-[9px] text-gray-500 truncate">${v.document} • ${v.company || 'PARTICULAR'} ➔ <span class="text-blue-700 font-bold">${v.host}</span></p>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="editVisit('${v.id}')" class="p-1.5 text-blue-500 hover:bg-blue-50 border border-transparent rounded"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                        <button onclick="markExit('${v.id}')" class="p-1.5 text-red-500 hover:bg-red-50 border border-transparent rounded"><i data-lucide="log-out" class="w-3.5 h-3.5"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const renderTodayLogs = () => {
            const container = document.getElementById('today-logs-table');
            const todayStr = new Date().toDateString();
            const todayVisits = visits.filter(v => new Date(v.entryTime).toDateString() === todayStr);
            
            container.innerHTML = todayVisits.map(v => `
                <tr class="border-b border-gray-100 text-[10px] hover:bg-gray-50">
                    <td class="px-3 py-1.5 font-bold uppercase">${v.name}</td>
                    <td class="px-3 py-1.5 text-gray-500">${v.document}</td>
                    <td class="px-3 py-1.5 text-blue-700 font-semibold uppercase">${v.host}</td>
                    <td class="px-3 py-1.5 font-mono">
                        <span class="text-green-600 font-bold">${new Date(v.entryTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${v.exitTime ? `<span class="text-gray-300 mx-1">/</span><span class="text-red-500 font-bold">${new Date(v.exitTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>` : ''}
                    </td>
                    <td class="px-3 py-1.5 text-center">
                        <span class="inline-block w-1.5 h-1.5 rounded-full ${v.status === 'active' ? 'bg-green-500' : 'bg-gray-300'}"></span>
                    </td>
                </tr>
            `).join('');
        };

        const renderReportTable = () => {
            const tbody = document.getElementById('report-table-body');
            const search = (document.getElementById('search-filter')?.value || "").toLowerCase();
            const host = (document.getElementById('search-host')?.value || "").toLowerCase();
            
            const filtered = visits.filter(v => {
                const mName = (v.name || "").toLowerCase().includes(search) || (v.document || "").includes(search);
                const mHost = (v.host || "").toLowerCase().includes(host);
                return mName && mHost;
            });

            tbody.innerHTML = filtered.map(v => `
                <tr class="hover:bg-gray-50 border-b border-gray-100 text-[10px]">
                    <td class="px-3 py-1 font-bold">${v.name}</td>
                    <td class="px-3 py-1 text-gray-500">${v.document}</td>
                    <td class="px-3 py-1 text-blue-600 font-bold uppercase">${v.host}</td>
                    <td class="px-3 py-1 text-gray-400">${new Date(v.entryTime).toLocaleDateString()}</td>
                    <td class="px-3 py-1 font-mono text-[9px]">
                        <span class="text-green-600">${new Date(v.entryTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${v.exitTime ? `<span class="text-gray-300"> - </span><span class="text-red-500">${new Date(v.exitTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>` : ''}
                    </td>
                    <td class="px-3 py-1 text-right flex gap-1 justify-end">
                        <button onclick="editVisit('${v.id}')" class="text-blue-400 hover:text-blue-600"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                        <button onclick="deleteVisit('${v.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('login-form').addEventListener('submit', login);
            document.getElementById('logout-btn').addEventListener('click', logout);
            document.getElementById('entry-form').addEventListener('submit', saveVisit);
            document.getElementById('v-doc').addEventListener('input', handleDocLookup);

            ['search-filter', 'search-host'].forEach(id => {
                document.getElementById(id).addEventListener('input', renderReportTable);
            });

            document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
            
            Object.assign(window, { 
                showTab: (tabId) => {
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('bg-blue-700', 'text-white'));
                    document.getElementById(tabId).classList.remove('hidden');
                    document.getElementById('btn-' + tabId).classList.add('bg-blue-700', 'text-white');
                    document.getElementById('current-tab-title').innerText = tabId.toUpperCase().replace('-', ' ');
                },
                editVisit: (id) => {
                    const v = visits.find(v => v.id === id);
                    if (!v) return;
                    
                    editingId = id;
                    document.getElementById('v-name').value = v.name;
                    document.getElementById('v-doc').value = v.document;
                    document.getElementById('v-company').value = v.company || '';
                    document.getElementById('v-vehicle').value = v.vehicle || '';
                    document.getElementById('v-host').value = v.host;
                    document.getElementById('v-reason').value = v.reason || '';
                    
                    document.getElementById('form-title').innerText = "MODIFICAR REGISTRO";
                    document.getElementById('btn-submit').innerText = "GUARDAR CAMBIOS";
                    document.getElementById('btn-cancel-edit').classList.remove('hidden');
                    
                    showTab('entry-management');
                },
                cancelEdit: () => {
                    editingId = null;
                    document.getElementById('entry-form').reset();
                    document.getElementById('form-title').innerText = "REGISTRO DE ACCESO";
                    document.getElementById('btn-submit').innerText = "CONFIRMAR ENTRADA";
                    document.getElementById('btn-cancel-edit').classList.add('hidden');
                },
                markExit: async (id) => {
                    const docRef = doc(db, 'artifacts', internalAppId, 'public', 'data', 'visits', id);
                    await updateDoc(docRef, { status: 'finished', exitTime: new Date().toISOString() });
                }, 
                deleteVisit: async (id) => {
                    if (confirm("¿Eliminar registro permanentemente?")) {
                        await deleteDoc(doc(db, 'artifacts', internalAppId, 'public', 'data', 'visits', id));
                    }
                }
            });
            
            window.showTab('dashboard');
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { animation: fadeIn 0.1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input, button, .card { border-radius: 2px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; }
    </style>
</head>
<body class="bg-gray-100 text-slate-900 overflow-hidden">

    <!-- Login -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white w-full max-w-sm p-8 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-10 h-10 bg-blue-600 mx-auto flex items-center justify-center mb-3">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-lg font-black text-slate-800">SECURE ACCESS PRO</h1>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mt-1">Control de Vigilancia</p>
            </div>
            <form id="login-form" class="space-y-3">
                <input type="email" id="login-email" required class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 outline-none text-xs" placeholder="Usuario / Email">
                <input type="password" id="login-pass" required class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 outline-none text-xs" placeholder="Contraseña">
                <div id="login-error" class="hidden text-red-500 text-[10px] font-bold bg-red-50 p-2 text-center"></div>
                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 hover:bg-slate-700 text-[10px] uppercase tracking-widest">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <!-- App -->
    <div id="main-app" class="hidden flex h-screen">
        <aside class="w-40 bg-slate-900 text-slate-300 flex flex-col border-r border-slate-700 shrink-0">
            <div class="p-3 border-b border-slate-800 text-center">
                <span class="text-[10px] font-black text-white tracking-tighter uppercase italic">Secure Pro</span>
            </div>
            <nav class="flex-1 p-1 space-y-0.5">
                <button onclick="showTab('dashboard')" id="btn-dashboard" class="sidebar-item w-full flex items-center gap-2 px-3 py-2 text-[10px] font-bold uppercase transition-all">
                    <i data-lucide="layout" class="w-3 h-3"></i> Panel
                </button>
                <button onclick="showTab('entry-management')" id="btn-entry-management" class="sidebar-item w-full flex items-center gap-2 px-3 py-2 text-[10px] font-bold uppercase transition-all">
                    <i data-lucide="user-plus" class="w-3 h-3"></i> Accesos
                </button>
                <button onclick="showTab('today-logs')" id="btn-today-logs" class="sidebar-item w-full flex items-center gap-2 px-3 py-2 text-[10px] font-bold uppercase transition-all">
                    <i data-lucide="list" class="w-3 h-3"></i> Hoy
                </button>
                <button onclick="showTab('reports')" id="btn-reports" class="sidebar-item w-full flex items-center gap-2 px-3 py-2 text-[10px] font-bold uppercase transition-all">
                    <i data-lucide="file-text" class="w-3 h-3"></i> Historial
                </button>
            </nav>
            <div class="p-2 bg-slate-800/50 border-t border-slate-700 text-center">
                <p id="user-email-display" class="text-[8px] truncate text-slate-500 mb-2 font-mono"></p>
                <button id="logout-btn" class="w-full text-red-400 py-1 text-[9px] font-bold uppercase hover:bg-red-900/20">Salir</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-white">
            <header class="bg-white border-b h-8 flex justify-between items-center px-4 shrink-0">
                <h2 id="current-tab-title" class="text-[10px] font-black uppercase text-slate-400">...</h2>
                <div class="flex items-center gap-4">
                    <span id="current-date" class="text-[9px] font-bold text-slate-400"></span>
                    <div class="flex items-center gap-1 text-[8px] font-bold text-green-600 uppercase">
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div> Online
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-3 space-y-3">
                <!-- Panel -->
                <div id="dashboard" class="tab-content grid grid-cols-3 gap-2">
                    <div class="bg-gray-50 p-3 border border-gray-100">
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">En Planta</p>
                        <h3 id="stat-active" class="text-2xl font-black text-blue-600 leading-none mt-1">0</h3>
                    </div>
                    <div class="bg-gray-50 p-3 border border-gray-100">
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Entradas Hoy</p>
                        <h3 id="stat-today" class="text-2xl font-black text-slate-800 leading-none mt-1">0</h3>
                    </div>
                    <div class="bg-gray-50 p-3 border border-gray-100">
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Vehículos</p>
                        <h3 id="stat-vehicles" class="text-2xl font-black text-amber-600 leading-none mt-1">0</h3>
                    </div>
                </div>

                <!-- Gestion de Accesos -->
                <div id="entry-management" class="tab-content hidden grid grid-cols-12 gap-3">
                    <div class="col-span-12 lg:col-span-5 bg-white border border-gray-200 p-3">
                        <div class="flex justify-between items-center mb-3">
                            <h3 id="form-title" class="text-[9px] font-black uppercase text-slate-500">Registro de Acceso</h3>
                            <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden text-red-500 text-[8px] font-bold uppercase hover:underline">Cancelar Edición</button>
                        </div>
                        <form id="entry-form" class="space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[8px] font-bold text-gray-400 uppercase">CI / DNI</label>
                                    <input type="text" id="v-doc" required class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 text-xs font-bold outline-none focus:border-blue-400" placeholder="Doc.">
                                </div>
                                <div>
                                    <label class="text-[8px] font-bold text-gray-400 uppercase">Empresa</label>
                                    <input type="text" id="v-company" class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 text-xs outline-none" placeholder="Opcional">
                                </div>
                            </div>
                            <div>
                                <label class="text-[8px] font-bold text-gray-400 uppercase">Nombre Completo</label>
                                <input type="text" id="v-name" required class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 text-xs outline-none uppercase" placeholder="Nombre">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[8px] font-bold text-gray-400 uppercase">Placa</label>
                                    <input type="text" id="v-vehicle" class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 text-xs outline-none uppercase" placeholder="Ej: ABC-123">
                                </div>
                                <div>
                                    <label class="text-[8px] font-bold text-gray-400 uppercase">Anfitrión</label>
                                    <input type="text" id="v-host" required class="w-full px-2 py-1.5 bg-gray-50 border border-gray-200 text-xs font-bold text-blue-800 outline-none uppercase" placeholder="¿A quién?">
                                </div>
                            </div>
                            <div>
                                <label class="text-[8px] font-bold text-gray-400 uppercase">Observación</label>
                                <textarea id="v-reason" class="w-full px-2 py-1 bg-gray-50 border border-gray-200 text-xs outline-none h-10" placeholder="Motivo..."></textarea>
                            </div>
                            <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-black py-2 text-[10px] uppercase tracking-widest hover:bg-blue-700 mt-1">Confirmar Entrada</button>
                        </form>
                    </div>
                    <div class="col-span-12 lg:col-span-7 border border-gray-200">
                        <div class="bg-slate-50 p-1.5 border-b border-gray-200 text-[9px] font-black uppercase text-slate-500 tracking-widest">Personal en Planta</div>
                        <div id="active-list-container" class="bg-white max-h-[320px] overflow-y-auto"></div>
                    </div>
                </div>

                <!-- Hoy -->
                <div id="today-logs" class="tab-content hidden border border-gray-200">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[8px] uppercase font-bold text-slate-400 border-b">
                            <tr>
                                <th class="px-3 py-1.5">Visitante</th>
                                <th class="px-3 py-1.5">Doc</th>
                                <th class="px-3 py-1.5">Anfitrión</th>
                                <th class="px-3 py-1.5">E/S</th>
                                <th class="px-3 py-1.5 text-center w-8">St</th>
                            </tr>
                        </thead>
                        <tbody id="today-logs-table" class="divide-y divide-gray-50 bg-white"></tbody>
                    </table>
                </div>

                <!-- Historial -->
                <div id="reports" class="tab-content hidden space-y-2">
                    <div class="bg-white p-2 border border-gray-200 flex gap-2">
                        <input type="text" id="search-filter" class="flex-1 p-1.5 bg-gray-50 border border-gray-200 text-[10px] outline-none" placeholder="Buscar Nombre o Doc...">
                        <input type="text" id="search-host" class="flex-1 p-1.5 bg-gray-50 border border-gray-200 text-[10px] outline-none" placeholder="Buscar Anfitrión...">
                    </div>
                    <div class="border border-gray-200 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[8px] uppercase text-slate-500 border-b font-bold">
                                <tr>
                                    <th class="px-3 py-1.5">Nombre</th>
                                    <th class="px-3 py-1.5">Doc</th>
                                    <th class="px-3 py-1.5">Anfitrión</th>
                                    <th class="px-3 py-1.5">Fecha</th>
                                    <th class="px-3 py-1.5">Horas</th>
                                    <th class="px-3 py-1.5 w-12 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="report-table-body" class="divide-y divide-gray-50 bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
